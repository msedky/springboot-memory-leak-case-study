server:
    port: 8041
spring:
  application:
    name: case-01-unbounded-cache
  datasource:
    url: jdbc:postgresql://localhost:5432/memory_leak_db
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  cache:
    type: caffeine
    cache-names:
      - products
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=1m

management:
  endpoints:
    web:
      exposure:
        include: health,metrics