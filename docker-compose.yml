version: '3.8'  
services:  
  postgres:  
    image: postgres:latest  
    environment:  
      POSTGRES_USER: user  
      POSTGRES_PASSWORD: password  
      POSTGRES_DB: mydatabase  
    ports:  
      - '5432:5432'  
    volumes:  
      - postgres_data:/var/lib/postgresql/data  
  springboot-service1:  
    image: springboot-service1:latest  
    ports:  
      - '8041:8041'  
    depends_on:  
      - postgres  
  springboot-service2:  
    image: springboot-service2:latest  
    ports:  
      - '8042:8042'  
    depends_on:  
      - postgres  
  springboot-service3:  
    image: springboot-service3:latest  
    ports:  
      - '8043:8043'  
    depends_on:  
      - postgres  
volumes:  
  postgres_data: {}  
