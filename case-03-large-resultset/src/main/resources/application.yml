server:
    port: 8043
spring:
  application:
    name: case-03-large-resultset
  datasource:
    url: jdbc:postgresql://localhost:5432/memory_leak_db
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 1000
        order_inserts: true
  jackson:
    datatype:
      datetime:
        write-dates-as-timestamps: true

management:
  endpoints:
    web:
      exposure:
        include: health,metrics